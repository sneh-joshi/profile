<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snehalkumar Joshi — Developer Profile</title>
    <script>
      // GitHub Pages SPA fallback
      // On 404, redirect to index.html preserving the path
      const path = window.location.pathname;
      const repo = '/dev-profile';
      if (path.startsWith(repo)) {
        const query = '?p=' + encodeURIComponent(path.slice(repo.length) + window.location.search);
        window.location.replace(window.location.origin + repo + '/' + query + '#' + window.location.hash);
      }
    </script>
  </head>
  <body></body>
</html>
